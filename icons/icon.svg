      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="60" fill="url(#bg)" stroke="#fff" stroke-width="3"/>
  <!-- Owl face -->
  <ellipse cx="48" cy="48" rx="18" ry="20" fill="#fff" opacity="0.95"/>
  <ellipse cx="80" cy="48" rx="18" ry="20" fill="#fff" opacity="0.95"/>
  <circle cx="48" cy="48" r="8" fill="#1e1b4b"/>
  <circle cx="80" cy="48" r="8" fill="#1e1b4b"/>
  <circle cx="50" cy="46" r="3" fill="#fff"/>
  <circle cx="82" cy="46" r="3" fill="#fff"/>
  <!-- Beak -->
  <polygon points="64,62 56,70 72,70" fill="#f59e0b"/>
  <!-- Body -->
  <ellipse cx="64" cy="85" rx="35" ry="28" fill="#fff" opacity="0.95"/>
  <!-- Graduation cap -->
  <polygon points="40,48 64,34 88,48 64,42" fill="#1e1b4b"/>
  <rect x="60" y="32" width="8" height="10" fill="#1e1b4b"/>
